<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MiniSocial{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'post_list' %}">MiniSocial</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'post_list' %}">Лента</a>
                </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <div class="navbar-nav ms-auto">
    {% if user.is_authenticated %}
        <span class="nav-link text-light">Привет, {{ user.username }}!</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="nav-link btn btn-link">Выход</button>
        </form>
    {% else %}
        <a class="nav-link" href="{% url 'login' %}">Вход</a>
        <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
    {% endif %}
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
