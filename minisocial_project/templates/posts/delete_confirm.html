{% extends 'base.html' %}

{% block content %}
    <div class="alert alert-danger">
        <h2>Удалить пост?</h2>
        <p>Вы уверены, что хотите удалить пост "<strong>{{ post.title }}</strong>"? Это действие необратимо.</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'post_detail' post.id %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
