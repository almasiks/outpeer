{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4 shadow">
            <h2 class="text-center">Вход в miniSocial</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <p class="mt-3 text-center">Нет аккаунта? <a href="{% url 'register' %}">Создать</a></p>
        </div>
    </div>
</div>
{% endblock %}
