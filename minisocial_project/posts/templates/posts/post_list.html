{% extends 'base.html' %}

{% block content %}
    <h2>Лента новостей</h2>
    {% for post in posts %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ post.title }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">Автор: {{ post.author.username }}</h6>
                <p class="card-text">{{ post.text }}</p>
                <small class="text-secondary">{{ post.created_at|date:"d M Y H:i" }}</small>
            </div>
        </div>
    {% empty %}
        <p>Постов пока нет. Будьте первым!</p>
    {% endfor %}
{% endblock %}
