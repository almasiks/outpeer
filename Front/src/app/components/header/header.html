<header class="header">
  <div class="container">
    <a routerLink="/" class="logo">KBTU TUTOR</a>
    <nav class="nav">
      <a routerLink="/">Найти Тьютора</a>
      <a routerLink="/become-tutor">Стать Тьютором</a>
    </nav>
    <div class="auth-actions">
      @if (isLoggedIn) {
        <button type="button" class="auth-btn auth-btn--primary" (click)="goToProfile()">Профиль</button>
      } @else {
        <button type="button" class="auth-btn" (click)="goToLogin()">Вход</button>
        <button type="button" class="auth-btn auth-btn--primary" (click)="goToRegister()">Регистрация</button>
      }
    </div>
  </div>
</header>
