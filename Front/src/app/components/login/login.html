<div class="auth-page">
  <div class="card">
    <a routerLink="/" class="logo">KBTU TUTOR</a>
    <h1>Вход</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="username">Логин</label>
        <input id="username" type="text" formControlName="username" placeholder="Введите логин"
          [class.invalid]="f['username'].invalid && f['username'].touched" />
        @if (f['username'].invalid && f['username'].touched) {
          <span class="err">Введите логин</span>
        }
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" formControlName="password" placeholder="Введите пароль"
          [class.invalid]="f['password'].invalid && f['password'].touched" />
        @if (f['password'].invalid && f['password'].touched) {
          <span class="err">Введите пароль</span>
        }
      </div>

      @if (error) {
        <div class="alert-error">{{ error }}</div>
      }

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        {{ isLoading ? 'Вход...' : 'Войти' }}
      </button>
    </form>

    <p class="switch">Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a></p>
  </div>
</div>
