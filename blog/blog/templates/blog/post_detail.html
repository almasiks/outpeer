{% extends 'blog/base.html' %}

{% block content %}
    <article class="post">
        <h1>{{ post.title }}</h1>
        <p>{{ post.text|linebreaksbr }}</p>
        <hr>
        <p>Автор: {{ post.author.name }}</p>
        <a href="{% url 'post_list' %}">← Назад к списку</a>
    </article>
{% endblock %}
