{% extends 'blog/base.html' %}
{% block title %} Все посты{% endblock %}
{% block content %}
    <h1>Все посты</h1>
    {% for post in posts %}
        <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
        <p>Author : {{ post.author.name }}</p>
        {% empty %}
        <p>постов пока нету</p>
    {% endfor %}
{% endblock %}
{% if posts.published %}
	<span>⬜</span>
    {% else %}
    <span>Черновик</span>
{% endif %}
